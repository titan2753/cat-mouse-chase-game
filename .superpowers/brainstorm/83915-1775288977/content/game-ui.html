<h2>游戏进行中的界面布局</h2>
<p class="subtitle">左上角按钮 + 底部道具栏 + 角色位置</p>

<div class="mockup">

  <div class="mockup-body" style="background: linear-gradient(135deg, #FFB6C1 0%, #E6E6FA 50%, #DDA0DD 100%); padding: 20px; min-height: 380px; position: relative; border-radius: 15px;">

    <!-- 左上角按钮 -->
    <div style="position: absolute; top: 15px; left: 15px; display: flex; gap: 8px;">
      <button style="background: rgba(255,255,255,0.9); padding: 10px 18px; border-radius: 10px; border: 2px solid #FF69B4; cursor: pointer; font-size: 14px; color: #8B008B; box-shadow: 0 3px 10px rgba(0,0,0,0.15);">

      </button>

    <!-- 关卡显示 -->

      </div>
      <div style="position: absolute; top: 60%; right: 30%; width: 25px; height: 35px; background: #C0C0C0; border-radius: 12px 12px 5px 5px; box-shadow: 0 3px 8px rgba(0,0,0,0.2);">
        <div style="position: absolute; top: 3px; left: 3px; width: 8px; height: 12px; background: #C0C0C0; border-radius: 50%;"></div>

      <div style="text-align: center;">

      <div style="text-align: center;">

          <span style="font-size: 24px;">❄️</span>
        </div>
        <div style="font-size: 12px; color: #8B008B; margin-top: 3px;">按键 3</div>
      </div>
      <div style="text-align: center;">
        <div style="width: 50px; height: 50px; background: rgba(200,200,200,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px dashed #999;">
          <span style="font-size: 16px; color: #999;">空</span>
        </div>
        <div style="font-size: 12px; color: #999; margin-top: 3px;">按键 4</div>
      </div>
    </div>

    <!-- 小提示 -->
    <div style="position: absolute; bottom: 15px; right: 15px; font-size: 10px; color: rgba(139,0,139,0.6); background: rgba(255,255,255,0.7); padding: 5px 10px; border-radius: 8px;">
      WASD 移动
    </div>

<div class="section" style="margin-top: 15px; padding: 15px; background: #FFF0F5; border-radius: 10px;">

  <ul style="color: #666; margin-left: 20px; line-height: 1.8;">
