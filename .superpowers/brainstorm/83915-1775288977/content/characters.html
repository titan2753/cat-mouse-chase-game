<h2>游戏角色应该是什么组合？</h2>
<p class="subtitle">抓捕者追逃生者，它们是什么角色？</p>

<div class="cards">
  <div class="card" data-choice="cat-mouse" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #FFF8E1; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="font-size: 45px;">🐱 追 🐭</div>
    </div>
    <div class="card-body">
      <h3>经典：猫和老鼠</h3>
      <p>致敬经典，猫追老鼠。大家都懂这个设定，天然有代入感。</p>
    </div>
  </div>

  <div class="card" data-choice="police-thief" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #E3F2FD; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="font-size: 45px;">👮 追 🦹</div>
    </div>
    <div class="card-body">
      <h3>警察和小偷</h3>
      <p>警察抓小偷，经典你追我赶设定。可以有钥匙开门的情节，很自然。</p>
    </div>
  </div>

  <div class="card" data-choice="wolf-sheep" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #E8F5E9; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="font-size: 45px;">🐺 追 🐑</div>
    </div>
    <div class="card-body">
      <h3>狼和羊</h3>
      <p>类似喜羊羊，狼想吃羊。可爱又有趣，女儿可能喜欢。</p>
    </div>
  </div>

  <div class="card" data-choice="custom" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #FCE4EC; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="font-size: 45px;">❓ 追 ❓</div>
    </div>
    <div class="card-body">
      <h3>自定义角色</h3>
      <p>你们有自己想的角色？比如爸爸追女儿、恐龙追小孩、或者其他创意？</p>
    </div>
  </div>
</div>
