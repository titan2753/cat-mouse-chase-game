<h2>攻击性武器道具应该有什么效果？</h2>
<p class="subtitle">打开宝箱得到武器，按1/2/3键使用</p>

<div class="cards">
  <div class="card" data-choice="slow-down" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #E3F2FD; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="text-align: center;">
        <div style="font-size: 40px;">⏱️</div>
        <div style="font-size: 14px; color: #666; margin-top: 10px;">猫减速5秒</div>
      </div>
    </div>
    <div class="card-body">
      <h3>减速道具（推荐）</h3>
      <p>使用后让猫变慢5秒，老鼠趁机逃跑或找钥匙。简单直观，策略性强。</p>
    </div>
  </div>

  <div class="card" data-choice="freeze" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #E8F5E9; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="text-align: center;">
        <div style="font-size: 40px;">❄️</div>
        <div style="font-size: 14px; color: #666; margin-top: 10px;">猫冻结3秒</div>
      </div>
    </div>
    <div class="card-body">
      <h3>冰冻道具</h3>
      <p>使用后猫完全停下3秒，效果更强但时间短。关键时刻能救命！</p>
    </div>
  </div>

  <div class="card" data-choice="trap" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #FFF3E0; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="text-align: center;">
        <div style="font-size: 40px;">🪤</div>
        <div style="font-size: 14px; color: #666; margin-top: 10px;">放置陷阱</div>
      </div>
    </div>
    <div class="card-body">
      <h3>陷阱道具</h3>
      <p>放置一个陷阱，猫踩到会被困住一段时间。可以提前布局，策略性最强。</p>
    </div>
  </div>

  <div class="card" data-choice="multi" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #FCE4EC; display: flex; align-items: center; justify-content: center; height: 120px;">
      <div style="text-align: center; font-size: 24px;">
        ⏱️ + ❄️ + 🪤
      </div>
    </div>
    <div class="card-body">
      <h3>多种道具组合</h3>
      <p>宝箱随机掉落不同道具：减速、冰冻、陷阱。玩家需要灵活使用不同策略。</p>
    </div>
  </div>
</div>
