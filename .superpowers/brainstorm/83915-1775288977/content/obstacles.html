<div class="options" data-multiselect>
  <div class="option" data-choice="walls" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>墙壁障碍</h3>
      <p>固定墙壁，猫和老鼠都绕不开。随着关卡增加，墙壁更多更复杂。</p>
    </div>
  </div>
  <div class="option" data-choice="furniture" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>家具障碍（猫和老鼠风格）</h3>
      <p>桌子、椅子、沙发等家具，符合动画片里的家庭场景。更有代入感！</p>
    </div>
  </div>
  <div class="option" data-choice="moving" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>移动障碍</h3>
      <p>有些障碍会移动（如扫地机器人），增加动态挑战。开发难度更高。</p>
    </div>
  </div>
</div>
